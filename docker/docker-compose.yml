version: '3.8'
services:
    mqtt-broker:
        image: eclipse-mosquitto:2.0.15
        container_name: ahu-mqtt
        ports:
            - "1883:1883"
            - "9001:9001"
        volumes:
            - ./mosquitto/config:/mosquitto/config
        restart: unless-stopped
    
    motor-simulator:
        build: ./motor-simulator
        container_name: ahu-motor-sim
        depends_on:
            - mqtt-broker
        restart: unless-stopped
        environment:
            MQTT_BROKER: mqtt-broker


